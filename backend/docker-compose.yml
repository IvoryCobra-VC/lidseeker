services:
  lidseeker:
    image: ghcr.io/ivorycobra-vc/lidseeker:latest
    container_name: lidseeker
    restart: unless-stopped
    network_mode: host          # reach Lidarr at localhost:8686
    user: "${PUID:-1000}:${PGID:-1000}"
    env_file: .env
    volumes:
      - ./data:/data            # SQLite request store
    environment:
      - TZ=${TZ:-UTC}

# This base file pulls the prebuilt image and runs lidseeker in Lidarr-native
# mode (download progress comes straight from Lidarr's queue — works with any
# Lidarr download client):
#   docker compose up -d
#
# Build from source instead (for development) by layering the build override:
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up -d --build
#
# Add the optional Soularr + slskd (Soulseek) adapter with its overlay:
#   docker compose -f docker-compose.yml -f docker-compose.soularr.yml up -d
