# Minimal Docker-socket proxy for lidseeker.
# Exposes EXACTLY ONE operation — restart the `soularr` container — and 403s
# everything else. The raw docker.sock lives only in this container (not in the
# internet-exposed lidseeker app), so a compromise of lidseeker can at most poke
# this single endpoint; no exec, no create, no other containers.
user root;                       # workers need to read root-owned docker.sock
worker_processes 1;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events { worker_connections 64; }

http {
    access_log /dev/stdout combined;
    upstream docker { server unix:/var/run/docker.sock; }

    server {
        listen 2375;
        server_name _;

        # The only thing the app may do.
        location = /containers/soularr/restart {
            limit_except POST { deny all; }
            proxy_http_version 1.1;
            proxy_pass http://docker;
        }

        # Everything else is refused.
        location / { return 403; }
    }
}
